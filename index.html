<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老槐树下 · 长按录制年轮</title>
<link rel="stylesheet" href="12.css">
</head>
<body>
<div id="stage">
    <div id="lottie-container">
        <!-- 小摊点击热区 -->
        <div id="clickStall" class="click-stall">
            <div class="click-stall-dot"></div>
        </div>
        <!-- 父亲点击热区 -->
        <div id="clickFather" class="click-father">
            <div class="click-father-dot"></div>
        </div>
        <!-- 8.0 粒子动画 Canvas（在面具下方） -->
        <canvas id="particle80Canvas"></canvas>
        <!-- img_17 遮挡层（与 Lottie 中"树"图层位置大小同步） -->
        <div id="mask17" style="position:absolute;pointer-events:none;z-index:1180;display:none;">
            <img src="images/img_17.png" style="width:100%;height:100%;">
        </div>
    </div>
    <!-- 落叶 Canvas（背景与树之间） -->
    <canvas id="leafCanvas"></canvas>
    <!-- Scene 8 交替图片：img_0 ⇄ 8.19，呼吸点控制 -->
    <div class="img-alt-pair">
        <img src="images/img_0.png">
        <img src="images/8.19.png">
        <div class="img-alt-dot"></div>
    </div>
    <!-- 独立树图层（img_53，与 Lottie 中位置大小一致，盖住叶子） -->
    <div id="tree-container">
        <img id="treeEl" src="images/img_53.png">
    </div>
    <!-- 树点击热区（第1幕，JS 同步缩放） -->
    <div id="clickTree" class="click-tree">
        <div class="click-tree-dot"></div>
    </div>
    <!-- img_37 树点击热区（第4幕 26~27s，JS 同步缩放） -->
    <div id="clickTree37" class="click-tree-37">
        <div class="click-tree-37-dot"></div>
    </div>
    <!-- img_17 树点击热区（第7幕，JS 同步缩放） -->
    <div id="clickTree17" class="click-tree-17">
        <div class="click-tree-17-dot"></div>
    </div>
    </div>
    <!-- 场景导航按钮：毛笔箭头 -->
    <button class="nav-btn nav-btn-left" id="navPrev" aria-label="上一幕">
        <svg viewBox="0 0 22 22">
            <filter id="inkRough">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="n"/>
                <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
            <path d="M16 5 L7 11 L16 17" fill="none" stroke="#2a1a08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#inkRough)"/>
        </svg>
        <span>上一页</span>
    </button>
    <button class="nav-btn nav-btn-right" id="navNext" aria-label="下一幕">
        <span>下一页</span>
        <svg viewBox="0 0 22 22">
            <path d="M6 5 L15 11 L6 17" fill="none" stroke="#2a1a08" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#inkRough)"/>
        </svg>
    </button>

    <div id="loading">
        <div class="loading-dot"></div>
        <div class="loading-text">槐荫渐浓 · 加载中</div>
        <div class="loading-hint">轻触开始</div>
    </div>
    <div id="error-panel">
        <div>🌿 画卷未能展开</div>
        <div class="retry-btn">重拾槐香</div>
    </div>
</div>

<!-- 字幕容器 -->
<div class="subtitle-container">
    <div class="subtitle-box" id="subtitleBox">
        <div class="subtitle-title" id="subtitleTitle"></div>
        <div class="subtitle-text" id="subtitleText"></div>
    </div>
</div>

<!-- Scene 2 进度条 -->
<div id="scrubberBar" class="scrubber-bar">
  <div class="scrubber-hint">← 拖动查看制伞过程 →</div>
  <div class="scrubber-track" id="scrubberTrack">
    <div class="scrubber-fill" id="scrubberFill"></div>
    <div class="scrubber-thumb" id="scrubberThumb">
      <div class="scrubber-thumb-ring"></div>
      <div class="scrubber-thumb-dot"></div>
    </div>
  </div>
</div>

<!-- 轮播图遮罩 -->
<div id="carouselOverlay" class="carousel-overlay">
  <button class="carousel-close" id="carouselClose">✕</button>
  <div class="carousel-inner">
    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-slide"><img src="images/10.1.png" alt="工笔牡丹"></div>
      <div class="carousel-slide"><img src="images/10.2.png" alt="水墨青竹"></div>
      <div class="carousel-slide"><img src="images/10.3.png" alt="红底描金"></div>
      <div class="carousel-slide"><img src="images/10.4.png" alt="青花山水"></div>
      <div class="carousel-slide"><img src="images/10.5.png" alt="豆绿寒梅"></div>
      <div class="carousel-slide"><img src="images/10.6.png" alt="喜鹊梅花"></div>
    </div>
  </div>
  <button class="carousel-arrow carousel-prev" id="carouselPrev">‹</button>
  <button class="carousel-arrow carousel-next" id="carouselNext">›</button>
  <div class="carousel-dots" id="carouselDots"></div>
</div>

<!-- 父亲轮播图遮罩 -->
<div id="carouselOverlayFather" class="carousel-overlay">
  <button class="carousel-close" id="carouselCloseFather">✕</button>
  <div class="carousel-inner">
    <div class="carousel-track" id="carouselTrackFather">
      <div class="carousel-slide"><img src="images/11.1.png" alt="父亲1"></div>
      <div class="carousel-slide"><img src="images/11.2.png" alt="父亲2"></div>
      <div class="carousel-slide"><img src="images/11.3.png" alt="父亲3"></div>
      <div class="carousel-slide"><img src="images/11.4.png" alt="父亲4"></div>
      <div class="carousel-slide"><img src="images/11.5.png" alt="父亲5"></div>
      <div class="carousel-slide"><img src="images/11.6.png" alt="父亲6"></div>
    </div>
  </div>
  <button class="carousel-arrow carousel-prev" id="carouselPrevFather">‹</button>
  <button class="carousel-arrow carousel-next" id="carouselNextFather">›</button>
  <div class="carousel-dots" id="carouselDotsFather"></div>
</div>

<!-- 录制按钮 -->
<div id="recordContainer" class="record-container">
    <canvas id="recordCanvas" class="record-canvas breathing" width="70" height="70"></canvas>
    <div id="recordTip" class="record-tip">长按开始录制</div>
</div>

<script src="lottie.min.js"></script>
<script src="12.js"></script>
</body>
</html>
